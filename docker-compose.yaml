version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: projetofiap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog-network

  backend-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techchallenger
    restart: always
    ports:
      - "3000:3000"
    env_file:
          - .env
    environment:
      - NODE_ENV=DEV       
      - DB_HOST=postgres-db      
    depends_on:
      - postgres-db
    networks:
      - blog-network

volumes:
  postgres_data:

networks:
  blog-network:
    driver: bridge